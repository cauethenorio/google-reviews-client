name: Publish

on:
  release:
    types: [published]

jobs:
  lint-and-test:
    uses: ./.github/workflows/lint-and-test.yml

  publish:
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - run: uv publish
